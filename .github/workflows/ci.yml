name: CI Safety Gate

# Mirrors the manual validation used for recent security PRs (P1/P2). Runs on
# every pull request to main and on pushes to main. No deployment, no secrets,
# no external execution, no real LLM calls — read-only repository permissions.

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Node 22 is required: the test runner uses --experimental-strip-types
          # to run TypeScript .mts test files directly.
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Alpha safety gate
        run: npm run alpha:safety-gate

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Cloudflare build
        run: npm run cf:build

      - name: Electron build check
        run: npm run electron:build:check

      - name: Diff check
        run: git diff --check
