# Cloudflare Pages + D1 Configuration
# =============================================================================
# PRODUCTION: Replace all REPLACE_* placeholders with real values.
#             Never commit real database IDs or account IDs to version control.
#             Use `wrangler secret` for API keys and secrets.
# =============================================================================

name = "workunit-os"
compatibility_date = "2025-01-01"

# ─── Pages ─────────────────────────────────────────────────────
pages_build_output_dir = ".next"

# ─── Environment Variables ──────────────────────────────────────
# Safe defaults: all dev/test flags OFF in production.
# Secrets (DEEPSEEK_API_KEY, etc.) set via `wrangler secret put`.

[vars]
EXTERNAL_ACTIONS_ENABLED = "false"
ALLOW_LEGACY_INGEST_FALLBACK = "false"

# ─── D1 Databases ───────────────────────────────────────────────
# REPLACE database_id with the output of:
#   wrangler d1 create workunit-control-db      → use its ID for CONTROL_DB
#   wrangler d1 create workunit-tenant            → use its ID for TENANT_DB_DEFAULT
#
# LOCAL DEV: run `wrangler d1 execute CONTROL_DB --local --file=migrations/0001_control_db.sql`

[[d1_databases]]
binding = "CONTROL_DB"
database_name = "workunit-control-db"
database_id = "REPLACE_WITH_CONTROL_DB_ID"

[[d1_databases]]
binding = "TENANT_DB_DEFAULT"
database_name = "workunit-tenant"
database_id = "REPLACE_WITH_TENANT_DB_ID"
